servo:
  pwm:
    # PWM2 signal pin. / 舵机信号线接开发板 PWM2。
    chip: 0
    channel: 0
    base_path: /sys/class/pwm
    polarity: normal

  timing:
    # 270-degree positional servo PWM: 20 ms period, 50 Hz.
    # 270 度定位舵机 PWM：20ms 周期，50Hz。
    period_ns: 20000000
    # Effective control range: 0.5ms=0deg, 1.0ms=135deg, 1.5ms=270deg.
    # Values above 1.5ms are clamped to 270deg; the driver never emits >1.5ms.
    min_pulse_us: 500
    neutral_pulse_us: 1000
    max_pulse_us: 1500

  angle:
    # 500us=0deg, 1000us=135deg, 1500us=270deg.
    min_deg: 0.0
    neutral_deg: 135.0
    max_deg: 270.0
    startup_deg: 120.0
    step_deg: 30.0
    settle_s: 0.35

  # Three physical sorting positions for the 270-degree positional servo.
  sorter:
    left_deg: 0
    center_deg: 120
    right_deg: 240

  auto_sort:
    enabled: true
    # Delay from completed camera/fusion decision to sorter action.
    # Tune this after measuring camera-to-servo distance and conveyor speed.
    delay_s: 0.8
    # Keep the last selected channel; only move again for the next mango decision.
    reset_to_center: false
    reset_delay_s: 0.45
    default_position: "2"
    log_csv: /home/elf/projects/datas/csv/mango_sorter_events.csv
    channel_positions:
      销售通道: "2"
      催熟通道: "1"
      加工通道: "3"
      复检通道: "3"
      剔除通道: "3"
      等待数据: "2"
    grade_positions:
      A级: "2"
      B级: "1"
      C级: "3"
      剔除: "3"
