servo:
  pwm:
    # PWM2 signal pin. / 舵机信号线接开发板 PWM2。
    chip: 0
    channel: 0
    base_path: /sys/class/pwm
    polarity: normal

  timing:
    # Standard servo PWM: 20 ms period, 50 Hz. / 标准舵机 PWM：20ms 周期，50Hz。
    period_ns: 20000000
    min_pulse_us: 500
    neutral_pulse_us: 1500
    max_pulse_us: 2500

  angle:
    # 180 degree positional servo using signed offset scale:
    # 500us=-90deg, 1500us=0deg, 2500us=90deg.
    min_deg: -90.0
    neutral_deg: 0.0
    max_deg: 90.0
    startup_deg: 0.0
    step_deg: 30.0
    settle_s: 0.35

  sorter:
    center_deg: 0.0
    left_deg: -45.0
    right_deg: 45.0

  auto_sort:
    enabled: true
    # Delay from completed camera/fusion decision to sorter action.
    # Tune this after measuring camera-to-servo distance and conveyor speed.
    delay_s: 0.8
    reset_to_center: true
    reset_delay_s: 0.45
    default_position: "2"
    log_csv: /home/elf/projects/datas/csv/mango_sorter_events.csv
    channel_positions:
      销售通道: "2"
      催熟通道: "1"
      加工通道: "3"
      复检通道: "3"
      剔除通道: "3"
      等待数据: "2"
    grade_positions:
      A级: "2"
      B级: "1"
      C级: "3"
      剔除: "3"
