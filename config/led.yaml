led:
  ws2812b:
    driver: spi
    device: /dev/spidev4.0
    # WS2812B DIN is connected to SPI4 MOSI.
    spi_bus: 4
    spi_device: 0
    spi_speed_hz: 2400000
    bit0_pattern: "100"
    bit1_pattern: "110"
    color_order: GRB
    # Per-channel white balance (0~1). Lower blue / green than red = warmer light.
    # 白平衡通道增益(0~1)。降低蓝、绿相对红色的比例即为暖色光。
    # 1.0 / 1.0 / 1.0 = neutral white; the values below give a warm (~3000K) tint.
    white_balance:
      r: 1.0
      g: 0.62
      b: 0.32
    # Set this to the total number of WS2812B LEDs in the ring.
    count: 90
    # 90 LEDs at 80% white can draw about 4.3 A. Keep startup current low;
    # use a dedicated 5 V LED supply before raising this value.
    default_brightness_pct: 40
    max_brightness_pct: 100
    state_file: /home/elf/projects/datas/csv/led_state.csv
    sensor_csv: /home/elf/projects/datas/csv/sensor_realtime.csv
