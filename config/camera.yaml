camera:
  # Camera source: /dev/videoX, index (0/1/2...), or full GStreamer pipeline string. / 摄像头来源：/dev/videoX、索引(0/1/2...)或完整 GStreamer 管线字符串。
  source: /dev/video21
  # Capture resolution requested from camera driver. / 向摄像头驱动请求的采集分辨率。
  width: 1920
  height: 1080
  # Camera capture FPS target. / 摄像头采集目标帧率。
  fps: 30
  # GUI refresh FPS (can be lower than capture FPS to reduce render load). / GUI 刷新帧率，可低于采集帧率以降低渲染负载。
  display_fps: 20
  # Display resize ratio before rendering (1.0 keeps original frame size). / 渲染前的显示缩放比例，1.0 保持原始帧尺寸。
  render_scale: 1.0
  # Use smooth scaling for better quality but higher CPU cost. / 使用平滑缩放可提升显示质量，但会增加 CPU 开销。
  smooth_scaling: false
  # Enable low-latency tuning in runtime. / 启用运行时低延迟调优。
  low_latency: true
  # Apply remote X11/MobaXterm-friendly tuning. / 启用适合远程 X11/MobaXterm 的显示调优。
  mobaxterm_mode: true
  # Window title shown in the PyQt5 preview. / PyQt5 预览窗口标题。
  window_title: CAM
  # OpenCV backend: auto | v4l2 | gstreamer. / OpenCV 后端：auto | v4l2 | gstreamer。
  backend: v4l2
