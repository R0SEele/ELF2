motor:
  serial:
    port: /dev/ttyS9
    baudrate: 115200
    timeout_s: 0.8
    write_timeout_s: 0.8

  driver:
    address: "0x01"
    sync: 0

  kctrl:
    # Initial speed in speed mode (RPM). / 速度模式下的初始速度(RPM)。
    default_speed_rpm: 1000.0
    # Speed step for key 1/2 decrement/increment (RPM). / 按键 1/2 每次减/加的速度步进(RPM)。
    speed_step_rpm: 10.0
    # Allowed speed range (RPM). / 允许速度范围(RPM)。
    min_speed_rpm: 10.0
    max_speed_rpm: 2000.0
    # Acceleration parameter (0..255). / 加速度参数(0~255)。
    accel: 10
    # Direction mapping: direction bits for q/e. / 方向映射：q/e 对应的方向位。
    forward_direction: 0
    reverse_direction: 1
    # Wait for driver ACK; use false if ACK frame format is unstable. / 是否等待驱动 ACK；若驱动返回帧格式不稳定，建议 false。
    wait_ack: false

  conveyor:
    # Qt conveyor speed range is 0.1~0.5 m/s. These RPM endpoints are used
    # when roller_diameter_m or rpm_per_ms is not configured.
    min_speed_rpm: 10.0
    max_speed_rpm: 2000.0
    # Optional calibration alternatives:
    # rpm_per_ms: 4000.0
    # roller_diameter_m: 0.06
