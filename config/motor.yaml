motor:
  serial:
    port: /dev/ttyS9
    baudrate: 115200
    timeout_s: 0.8
    write_timeout_s: 0.8

  driver:
    address: "0x01"
    # zdt_v2 uses speed slope + target speed x10; emm_v5 uses speed + 8-bit accel.
    protocol: emm_v5
    sync: 0

  kctrl:
    # Initial speed in speed mode (RPM). / 速度模式下的初始速度(RPM)。
    default_speed_rpm: 1000.0
    # Speed step for key 1/2 decrement/increment (RPM). / 按键 1/2 每次减/加的速度步进(RPM)。
    speed_step_rpm: 10.0
    # Allowed speed range (RPM). / 允许速度范围(RPM)。
    min_speed_rpm: 10.0
    max_speed_rpm: 3000.0
    # Acceleration for emm_v5, 0..255. Larger values accelerate faster.
    accel: 10
    # Delay after enabling the driver before sending speed command. / 使能后发速度命令前的延时。
    enable_delay_s: 0.08
    # Direction mapping: direction bits for q/e. / 方向映射：q/e 对应的方向位。
    forward_direction: 0
    reverse_direction: 1
    # Wait for driver ACK so Qt reports protocol errors instead of assuming success.
    wait_ack: true

  conveyor:
    # Qt conveyor speed range. These RPM endpoints are used
    # when roller_diameter_m or rpm_per_ms is not configured.
    min_speed_ms: 0.1
    max_speed_ms: 1.0
    default_speed_ms: 0.5
    min_speed_rpm: 10.0
    max_speed_rpm: 3000.0
    # Optional calibration alternatives:
    # rpm_per_ms: 4000.0
    # roller_diameter_m: 0.06
